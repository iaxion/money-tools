name: Auto-merge

# 自動改善PR(ブランチ auto/*)を、CIが緑になったら自動マージする。
# 例外: src/lib/tax.ts（税率・控除＝お金の計算ロジック）を変更するPRは
#       自動マージせず needs-human-review ラベルを付けて停止する（YMYL の安全弁）。
#
# CI ワークフロー(ci.yml)の完了をトリガーに動く。CIが成功し、対象が auto/* ブランチの
# PR のときだけ判定する。

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    # CI が成功し、auto/ 始まりのブランチのときだけ
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'auto/')
    steps:
      - uses: actions/checkout@v4

      - name: 対象PRと変更ファイルを判定して自動マージ / 承認待ち化
        run: |
          set -euo pipefail

          # head ブランチに紐づく open PR 番号を取得
          pr=$(gh pr list --state open --head "$HEAD_BRANCH" --json number --jq '.[0].number' || true)
          if [ -z "${pr:-}" ] || [ "$pr" = "null" ]; then
            echo "対象ブランチ $HEAD_BRANCH に open PR が見つからないため終了。"
            exit 0
          fi
          echo "対象 PR: #$pr ($HEAD_BRANCH)"

          # 変更ファイル一覧
          files=$(gh pr view "$pr" --json files --jq '.files[].path')
          echo "変更ファイル:"; echo "$files"

          # 金額ロジック(tax.ts)変更は「可視化ラベル」を付ける。
          # フルオート方針: 計算ユニットテスト(CI)が安全弁。人間ゲートで止めない。
          # 事後確認できるよう money-logic-changed を付けてコメントを残す。
          if echo "$files" | grep -qx 'src/lib/tax.ts'; then
            echo "tax.ts 変更を検出。可視化ラベルを付けて自動マージを継続する。"
            gh label create "money-logic-changed" --color 0E8A16 \
              --description "税率/控除ロジックの自動変更（計算テスト通過済み・事後確認用）" 2>/dev/null || true
            gh pr edit "$pr" --add-label "money-logic-changed" || true
            gh pr comment "$pr" --body "💰 税率・控除ロジック(\`src/lib/tax.ts\`)を変更。計算ユニットテスト(CI)通過のため自動マージします。念のため事後確認を推奨（AUTONOMY.md 参照）。" || true
          fi

          echo "CI緑のため自動マージ(squash)します。"
          gh pr merge "$pr" --squash --delete-branch

          # 紐付くIssueを確実にクローズする。
          # GITHUB_TOKEN によるマージでは commit 内の "closes #N" が自動発火しないため明示的に閉じる。
          # 番号は ブランチ auto/issue-<番号> → PR本文の close/fix/resolve #<番号> の順で拾う。
          issue=$(printf '%s' "$HEAD_BRANCH" | grep -oE 'issue-[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          if [ -z "${issue:-}" ]; then
            issue=$(gh pr view "$pr" --json body --jq '.body // ""' \
              | grep -oiE '(clos|fix|resolv)[a-z]*[[:space:]]+#[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          fi
          if [ -n "${issue:-}" ]; then
            echo "紐付き Issue #$issue をクローズします。"
            gh issue close "$issue" --comment "対応PR #$pr がマージされたため自動クローズしました。" || true
          else
            echo "紐付き Issue は検出されませんでした（クローズなし）。"
          fi

          # マージ成功をSlack通知
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            pr_title=$(gh pr view "$pr" --json title --jq '.title' 2>/dev/null || echo "PR #$pr")
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"✅ 自動マージ完了: ${pr_title}\nhttps://github.com/${{ github.repository }}/pull/$pr\"}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
